groups:
  - name: k8s
    rules:
      - alert: k8sIsDown
        expr: up == 0
        for: 3s
        labels:
          severity: critical
        annotations:
          summary: "The target {{ $labels.job }} is down"
          description: "Instance {{ $labels.instance }} из job {{ $labels.job }} не отвечает в течении 3 секунд."
 
